name: Build Wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build_wheels:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 Linux only on Intel GitHub runners (cannot run aarch64 containers).
          - os: ubuntu-latest
            label: linux-x86_64
            cibw_archs_linux: x86_64
          # aarch64 Linux needs a native ARM runner (or QEMU, which is slow).
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            cibw_archs_linux: aarch64
          - os: macos-latest
            label: macos
            cibw_archs_linux: ""
          - os: windows-latest
            label: windows
            cibw_archs_linux: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.4
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          # 32-bit Linux/Windows and musl are skipped: SciPy has no wheels there.
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs_linux }}
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_TEST_COMMAND: "python -c \"import acor, _acor_cpp; print(acor.__name__)\""

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.label }}
          path: wheelhouse/*.whl

  publish_pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten wheel directory
        shell: bash
        run: |
          mkdir -p final-dist
          find dist -name "*.whl" -exec cp {} final-dist/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: final-dist
